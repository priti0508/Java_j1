<!doctype html>
<html lang="en">

<head>
    <title>Contact Us - ElectroStore</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    
    <style>
        body {
    
            background: linear-gradient(to right, #aa62e9, #6723ee);
            
   
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-md navbar-dark bg-black shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="https://t3.ftcdn.net/jpg/03/20/72/66/360_F_320726662_XVxhHxXYGwXnBMkHRnEeHJ4hA6gH0DqN.jpg"
                        class="img-fluid rounded-circle" alt="Logo" height="50px" width="50px" />
                  
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapsibleNavId" aria-controls="collapsibleNavId" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="collapsibleNavId">
                    <ul class="navbar-nav me-auto mt-2 mt-lg-0 gap-4 ms-3">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="product.html">Products</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                        
                        <li class="nav-item"><a class="nav-link" href="product-details.html">Product-details</a></li>
                    </ul>
                    <a class="btn btn-outline-light my-2 my-sm-0" href="register.html">Register</a>
                
                </div>
            </div>
        </nav>
    </header>

    <main class="d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    
                    <div class="card shadow-lg border-0 mt-4 mb-4" style="background-color: rgba(255, 255, 255, 0.95);">
                        <div class="card-body p-4">
                            
                            <h3 class="text-center mb-0 fw-bold text-dark">Contact Us</h3>
                        
                            
                            <form>
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-dark">Name</label>
                                    <input type="text" class="form-control" placeholder="Enter full name">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold text-dark">Email</label>
                                    <input type="email" class="form-control" placeholder="Enter email">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold text-dark">Phone</label>
                                    <input type="tel" class="form-control" placeholder="Enter mobile number">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold text-dark">Message</label>
                                    <textarea class="form-control" rows="4" placeholder="Type your message here..."></textarea>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg fw-bold">Send Message</button>
                                </div>
                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black text-white text-center py-4">
        <div class="container">
            <p class="mb-0">&copy; 2025 ElectroStore. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
